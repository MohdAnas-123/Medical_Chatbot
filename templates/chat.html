<!DOCTYPE html>
<html>
<head>
    <title>Medical Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
</head>

<body>
    <div class="container-fluid h-100">
        <div class="row justify-content-center h-100">      
            <div class="col-md-10 col-lg-8 col-xl-6 chat">
                <div class="card">
                    
                    <div class="card-header msg_head">
                        <div class="d-flex bd-highlight">
                            <div class="img_cont">
                                <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img">
                                <span class="online_icon"></span>
                            </div>
                            <div class="user_info">
                                <span>Medical AI Assistant</span>
                                <p>Online & ready to help</p>
                            </div>
                        </div>
                    </div>
                    
                    <div id="chat-body" class="card-body msg_card_body">
                        <div class="d-flex justify-content-start mb-4">
                            <div class="img_cont_msg">
                                <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg">
                            </div>
                            <div class="msg_cotainer">
                                Hello! I am your AI Medical Assistant. How can I help you today?
                            </div>
                        </div>
                    </div>
                    
                    <div class="card-footer">
                        <form id="messageArea" class="input-group">
                            <input type="text" id="text" name="msg" placeholder="Type your medical question here..." autocomplete="off" class="form-control type_msg" required/>
                            <div class="input-group-append">
                                <button type="submit" id="send" class="input-group-text send_btn"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </form>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
    
    <script>
        $(document).ready(function() {
            function scrollToBottom() {
                var chatWindow = $("#chat-body");
                chatWindow.animate({ scrollTop: chatWindow.prop("scrollHeight") }, 500);
            }

            $("#messageArea").on("submit", function(event) {
                event.preventDefault(); 
                
                const date = new Date();
                const str_time = date.getHours().toString().padStart(2, '0') + ":" + date.getMinutes().toString().padStart(2, '0');
                
                var rawText = $("#text").val();
                if (!rawText.trim()) return;

                // User Bubble
                var userHtml = '<div class="d-flex justify-content-end mb-4"><div class="msg_cotainer_send">' + rawText + '<span class="msg_time_send">'+ str_time + '</span></div><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="rounded-circle user_img_msg"></div></div>';
                
                $("#text").val(""); 
                $("#chat-body").append(userHtml);
                scrollToBottom();

                // Typing Indicator Bubble
                var typingHtml = '<div id="typing-indicator" class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg"></div><div class="msg_cotainer"><i>Typing...</i></div></div>';
                $("#chat-body").append(typingHtml);
                scrollToBottom();

                // AJAX Call to Flask
                $.ajax({
                    data: { msg: rawText },
                    type: "POST",
                    url: "/get",
                }).done(function(data) {
                    $("#typing-indicator").remove();
                    
                    // Bot Bubble
                    var botHtml = '<div class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg"></div><div class="msg_cotainer">' + data + '<span class="msg_time">' + str_time + '</span></div></div>';
                    $("#chat-body").append($.parseHTML(botHtml));
                    scrollToBottom();
                }).fail(function() {
                    $("#typing-indicator").remove();
                    var errorHtml = '<div class="d-flex justify-content-start mb-4"><div class="msg_cotainer" style="background-color: #ffcccc; color: #cc0000;">Sorry, I encountered an error connecting to the server.</div></div>';
                    $("#chat-body").append(errorHtml);
                    scrollToBottom();
                });
            });
        });
    </script>
</body>
</html>
